<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRP Vision — Punto de Control</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; background: #111; border-bottom: 1px solid #333; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .badge { background: #22c55e; color: #000; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 700; }

    /* Grid de sesiones */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 16px; padding: 16px; }

    /* Card de sesion */
    .session-card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; overflow: hidden; }
    .session-card.alert-high { border-color: #f59e0b; }
    .session-card.alert-critical { border-color: #ef4444; animation: border-pulse 1s infinite; }
    @keyframes border-pulse { 0%, 100% { border-color: #ef4444; } 50% { border-color: #991b1b; } }

    .card-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #222; }
    .card-header .equip { font-weight: 600; font-size: 14px; }
    .card-header .tech { font-size: 12px; color: #888; }
    .risk-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .risk-none { background: #1e3a2f; color: #22c55e; }
    .risk-low { background: #1e3a2f; color: #22c55e; }
    .risk-medium { background: #3a321e; color: #f59e0b; }
    .risk-high { background: #3a2a1e; color: #f97316; }
    .risk-critical { background: #3a1e1e; color: #ef4444; }

    /* Frame display */
    .frame-area { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; }
    .frame-area img { width: 100%; height: 100%; object-fit: contain; }
    .frame-area .no-frame { color: #555; font-size: 14px; }

    /* Instruction area */
    .instruction-area { padding: 12px 14px; min-height: 60px; }
    .instruction-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .instruction-content { font-size: 14px; line-height: 1.5; }
    .instruction-content.from-senior { color: #60a5fa; }

    /* Components */
    .detected { display: flex; gap: 4px; flex-wrap: wrap; padding: 0 14px 8px; }
    .det-tag { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.3); border-radius: 4px; padding: 1px 6px; font-size: 10px; color: #93c5fd; }

    /* Anomalies */
    .anomalies { padding: 0 14px 8px; }
    .anomaly-tag { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 4px; padding: 1px 6px; font-size: 10px; color: #fca5a5; margin-right: 4px; }

    /* Feedback buttons */
    .feedback-bar { display: flex; gap: 6px; padding: 8px 14px; border-top: 1px solid #333; align-items: center; }
    .feedback-bar .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-right: 4px; }
    .fb-btn { border: 1px solid #444; background: #222; color: #ccc; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
    .fb-btn:hover { background: #333; }
    .fb-btn.correct { border-color: #22c55e40; }
    .fb-btn.correct:hover, .fb-btn.correct.active { background: #22c55e20; color: #22c55e; border-color: #22c55e; }
    .fb-btn.partial { border-color: #f59e0b40; }
    .fb-btn.partial:hover, .fb-btn.partial.active { background: #f59e0b20; color: #f59e0b; border-color: #f59e0b; }
    .fb-btn.incorrect { border-color: #ef444440; }
    .fb-btn.incorrect:hover, .fb-btn.incorrect.active { background: #ef444420; color: #ef4444; border-color: #ef4444; }
    .fb-count { font-size: 11px; color: #555; margin-left: auto; }

    /* Senior input */
    .senior-input { display: flex; gap: 8px; padding: 10px 14px; border-top: 1px solid #333; }
    .senior-input input { flex: 1; background: #222; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
    .senior-input button { background: #3b82f6; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .senior-input button:hover { background: #2563eb; }

    /* Log panel */
    .log-panel { padding: 8px 14px 14px; border-top: 1px solid #333; max-height: 150px; overflow-y: auto; }
    .log-entry { font-size: 11px; color: #888; padding: 2px 0; border-bottom: 1px solid #1a1a1a; }
    .log-entry .time { color: #555; margin-right: 6px; }
    .log-entry.ai { color: #a0a0a0; }
    .log-entry.senior { color: #60a5fa; }
    .log-entry.alert { color: #ef4444; font-weight: 600; }

    /* Empty state */
    .empty { text-align: center; padding: 80px 20px; color: #555; }
    .empty h2 { font-size: 24px; margin-bottom: 8px; color: #888; }
  </style>
</head>
<body>

  <div class="header">
    <h1>SRP Vision — Punto de Control</h1>
    <div>
      <span class="badge" id="sessionCount">0 sesiones</span>
      <span style="margin-left:12px; font-size:12px; color:#888;" id="wsStatus">Conectando...</span>
    </div>
  </div>

  <div class="grid" id="grid">
    <div class="empty" id="emptyState">
      <h2>Sin sesiones activas</h2>
      <p>Las sesiones de los tecnicos apareceran aqui automaticamente</p>
    </div>
  </div>

  <script>
    const WS_URL = `ws://${location.host}/ws/vision`;
    let ws = null;
    const sessions = new Map(); // sessionId -> { element, data, log[] }

    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        document.getElementById('wsStatus').textContent = 'Conectado';
        ws.send(JSON.stringify({ type: 'dashboard:subscribe' }));
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        switch (msg.type) {
          case 'dashboard:sessions':
            msg.sessions.forEach(s => addSession(s));
            break;

          case 'session:started':
            addSession(msg.session);
            break;

          case 'session:ended':
            removeSession(msg.sessionId);
            break;

          case 'vision:frame_analyzed':
            updateSession(msg.sessionId, msg.analysis, msg.audioUrl, msg.imageBase64, msg.frameId, msg.imagePath);
            break;

          case 'vision:instruction':
            addLog(msg.sessionId, msg.source, msg.content, msg.riskLevel);
            break;

          case 'vision:alert':
            handleAlert(msg.sessionId, msg);
            break;
        }
      };

      ws.onclose = () => {
        document.getElementById('wsStatus').textContent = 'Reconectando...';
        setTimeout(connect, 3000);
      };
    }

    function addSession(session) {
      if (sessions.has(session.id)) return;
      document.getElementById('emptyState')?.remove();

      const card = document.createElement('div');
      card.className = 'session-card';
      card.id = `session-${session.id}`;
      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="equip">${esc(session.equipment_tag)}</div>
            <div class="tech">${esc(session.technician_phone)} &mdash; ${new Date(session.started_at).toLocaleTimeString()}</div>
          </div>
          <span class="risk-badge risk-none" id="risk-${session.id}">OK</span>
        </div>
        <div class="frame-area" id="frame-${session.id}">
          <span class="no-frame">Esperando frames...</span>
        </div>
        <div class="instruction-area">
          <div class="instruction-label">Instruccion IA</div>
          <div class="instruction-content" id="instr-${session.id}">-</div>
        </div>
        <div class="detected" id="det-${session.id}"></div>
        <div class="anomalies" id="anom-${session.id}"></div>
        <div class="feedback-bar" id="fb-${session.id}">
          <span class="label">Evaluacion:</span>
          <button class="fb-btn correct" onclick="rateLast('${session.id}','correct',this)">Correcto</button>
          <button class="fb-btn partial" onclick="rateLast('${session.id}','partial',this)">Parcial</button>
          <button class="fb-btn incorrect" onclick="rateLast('${session.id}','incorrect',this)">Incorrecto</button>
          <span class="fb-count" id="fb-count-${session.id}">0 evaluados</span>
        </div>
        <div class="senior-input">
          <input type="text" placeholder="Instruccion del senior..." id="input-${session.id}" onkeydown="if(event.key==='Enter')sendSenior('${session.id}')">
          <button onclick="sendSenior('${session.id}')">Enviar</button>
        </div>
        <div class="log-panel" id="log-${session.id}"></div>
      `;

      document.getElementById('grid').appendChild(card);
      sessions.set(session.id, { element: card, data: session, log: [] });
      updateCount();
    }

    function removeSession(sessionId) {
      const session = sessions.get(sessionId);
      if (session) {
        session.element.remove();
        sessions.delete(sessionId);
      }
      updateCount();
      if (sessions.size === 0) {
        document.getElementById('grid').innerHTML = `
          <div class="empty" id="emptyState">
            <h2>Sin sesiones activas</h2>
            <p>Las sesiones de los tecnicos apareceran aqui automaticamente</p>
          </div>`;
      }
    }

    function updateSession(sessionId, analysis, audioUrl, imageBase64, frameId, imagePath) {
      if (!sessions.has(sessionId)) return;
      const sess = sessions.get(sessionId);

      // Track last frame for feedback
      sess.lastFrame = { frameId, sessionId, analysis, imageBase64, imagePath };

      // Update frame image
      if (imageBase64) {
        const frameArea = document.getElementById(`frame-${sessionId}`);
        if (frameArea) {
          frameArea.innerHTML = `<img src="data:image/jpeg;base64,${imageBase64}" alt="Frame">`;
        }
      }

      // Update instruction
      const instrEl = document.getElementById(`instr-${sessionId}`);
      if (instrEl) instrEl.textContent = analysis.instruction;

      // Update risk badge
      const riskEl = document.getElementById(`risk-${sessionId}`);
      if (riskEl) {
        riskEl.className = `risk-badge risk-${analysis.risk_level}`;
        riskEl.textContent = analysis.risk_level.toUpperCase();
      }

      // Update card border
      const card = document.getElementById(`session-${sessionId}`);
      if (card) {
        card.className = 'session-card';
        if (analysis.risk_level === 'high') card.classList.add('alert-high');
        if (analysis.risk_level === 'critical') card.classList.add('alert-critical');
      }

      // Components
      const detEl = document.getElementById(`det-${sessionId}`);
      if (detEl) {
        detEl.innerHTML = (analysis.detected_components || [])
          .map(c => `<span class="det-tag">${esc(c)}</span>`).join('');
      }

      // Anomalies
      const anomEl = document.getElementById(`anom-${sessionId}`);
      if (anomEl) {
        anomEl.innerHTML = (analysis.anomalies || [])
          .map(a => `<span class="anomaly-tag">${esc(a)}</span>`).join('');
      }

      addLog(sessionId, 'ai', analysis.instruction, analysis.risk_level);
    }

    function handleAlert(sessionId, msg) {
      addLog(sessionId, 'alert', `[${msg.riskLevel.toUpperCase()}] ${msg.message}`, msg.riskLevel);
    }

    function addLog(sessionId, source, content, riskLevel) {
      const logEl = document.getElementById(`log-${sessionId}`);
      if (!logEl) return;

      const entry = document.createElement('div');
      const cls = source === 'alert' ? 'alert' : source === 'senior' ? 'senior' : 'ai';
      entry.className = `log-entry ${cls}`;
      const time = new Date().toLocaleTimeString();
      entry.innerHTML = `<span class="time">${time}</span> [${source}] ${esc(content)}`;

      logEl.insertBefore(entry, logEl.firstChild);

      // Keep only last 20
      while (logEl.children.length > 20) logEl.removeChild(logEl.lastChild);
    }

    function sendSenior(sessionId) {
      const input = document.getElementById(`input-${sessionId}`);
      const content = input.value.trim();
      if (!content || !ws) return;

      ws.send(JSON.stringify({
        type: 'senior:instruction',
        sessionId,
        content,
      }));

      addLog(sessionId, 'senior', content, 'none');
      input.value = '';
    }

    function updateCount() {
      document.getElementById('sessionCount').textContent = `${sessions.size} sesion${sessions.size !== 1 ? 'es' : ''}`;
    }

    // ── Feedback / Training ─────────────────────────────────────────────────

    const trainingCounts = new Map(); // sessionId -> count

    async function rateLast(sessionId, rating, btn) {
      const sess = sessions.get(sessionId);
      if (!sess?.lastFrame) return;

      const { frameId, analysis, imagePath } = sess.lastFrame;
      const equipmentTag = sess.data.equipment_tag;

      // Si es incorrecto, pedir corrección
      let seniorCorrection = null;
      if (rating === 'incorrect' || rating === 'partial') {
        seniorCorrection = prompt('Escribe la instruccion correcta:');
        if (seniorCorrection === null) return; // canceló
      }

      // Enviar al backend
      try {
        const resp = await fetch('/api/vision/training', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            frameId,
            sessionId,
            equipmentTag,
            imagePath: imagePath || '',
            analysisJson: analysis,
            rating,
            seniorCorrection,
          }),
        });
        if (!resp.ok) throw new Error(await resp.text());

        // Visual feedback
        const bar = document.getElementById(`fb-${sessionId}`);
        bar.querySelectorAll('.fb-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Update count
        const count = (trainingCounts.get(sessionId) || 0) + 1;
        trainingCounts.set(sessionId, count);
        document.getElementById(`fb-count-${sessionId}`).textContent = `${count} evaluados`;

        addLog(sessionId, 'senior', `Evaluacion: ${rating}${seniorCorrection ? ' — ' + seniorCorrection : ''}`, 'none');
      } catch (e) {
        console.error('Error guardando feedback:', e);
      }
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // Init
    connect();
  </script>
</body>
</html>
